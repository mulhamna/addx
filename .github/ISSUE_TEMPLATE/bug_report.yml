name: Bug report
description: Something in addx is broken or behaves unexpectedly
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npx @mulham28/addx ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: addx version
      description: Output of `addx --version`.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Re-run with `ADDX_DEBUG=1` and paste relevant output.
      render: shell
