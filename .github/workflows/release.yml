name: Release

on:
  release:
    types: [published]

env:
  REPO: ${{ github.repository }}
  TAG: ${{ github.event.release.tag_name }}

jobs:
  # Cross-compile all platform binaries from one Linux runner (bun --compile),
  # attach them + SHA256SUMS to the GitHub Release.
  build-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Compile binaries
        run: |
          set -euo pipefail
          for t in darwin-x64 darwin-arm64 linux-x64 linux-arm64 windows-x64; do
            out="addx-$t"
            [ "$t" = "windows-x64" ] && out="$out.exe"
            echo "Building $out"
            bun build src/index.ts --compile --minify --target="bun-$t" --outfile "$out"
          done
          shasum -a 256 addx-* > SHA256SUMS
          cat SHA256SUMS
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" addx-* SHA256SUMS --clobber

  publish-npm:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-gh-packages:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@mulhamna'
      - run: bun install --frozen-lockfile
      - run: bun run build
      # GitHub Packages requires the scope to match the repo owner.
      - name: Rewrite scope for GitHub Packages
        run: npm pkg set name=@mulhamna/addx
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: build-binaries
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "$TAG" -p SHA256SUMS
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: mulhamna/homebrew-tap
          token: ${{ secrets.RELEASE_ADDX }}
          path: tap
      - name: Render formula
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          mkdir -p tap/Formula
          VERSION="$VERSION" bun scripts/render-homebrew.ts SHA256SUMS tap/Formula/addx.rb
      - name: Commit and push
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/addx.rb
          git commit -m "addx ${TAG}" || { echo "no changes"; exit 0; }
          git push

  update-scoop:
    needs: build-binaries
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "$TAG" -p SHA256SUMS
      - name: Checkout bucket
        uses: actions/checkout@v4
        with:
          repository: mulhamna/scoop-bucket
          token: ${{ secrets.RELEASE_ADDX }}
          path: bucket
      - name: Render manifest
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          mkdir -p bucket/bucket
          VERSION="$VERSION" bun scripts/render-scoop.ts SHA256SUMS bucket/bucket/addx.json
      - name: Commit and push
        working-directory: bucket
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/addx.json
          git commit -m "addx ${TAG}" || { echo "no changes"; exit 0; }
          git push
